<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DBug LETTER — 지난 레터</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gray-md:  #AAAAAA;
      --blue-lt:  #C6D6E5;
      --red:      #DD1115;
      --gray-lt:  #F0F0F0;
      --white:    #FFFFFD;
      --charcoal: #3E3E3D;
    }
    html, body {
      width: 100%; min-height: 100vh;
      background: var(--gray-md);
      font-family: 'Pretendard', sans-serif;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 28px 16px;
    }
    .window {
      width: min(860px, 100%);
      background: var(--white);
      border-top: 1px solid #ccc; border-left: 1px solid #ccc;
      border-right: 1px solid #777; border-bottom: 1px solid #777;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
      display: flex; flex-direction: column;
      animation: open 0.25s ease forwards;
      opacity: 0; transform: translateY(8px);
    }
    @keyframes open { to { opacity:1; transform:translateY(0); } }

    /* TITLE BAR */
    .titlebar {
      display: flex; align-items: center;
      background: linear-gradient(180deg, #C6D6E5 0%, #a8bfd4 100%);
      height: 30px; padding: 0 4px 0 6px;
      border-bottom: 1px solid #8aaabf;
      user-select: none; gap: 6px; flex-shrink: 0;
    }
    .tb-icon { width: 18px; height: 18px; }
    .tb-icon img { width: 18px; height: 18px; border-radius: 3px; object-fit: cover; }
    .tb-title { font-size: 12px; font-weight: 700; color: #1a2a38; flex: 1; }
    .win-controls { display: flex; gap: 2px; margin-left: auto; }
    .wc {
      width: 22px; height: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; cursor: default;
      border-top: 1px solid #dde8f0; border-left: 1px solid #dde8f0;
      border-right: 1px solid #6a8fa8; border-bottom: 1px solid #6a8fa8;
      background: linear-gradient(180deg, #d8e8f4 0%, #b0c8dc 100%);
      color: #1a2a38;
    }

    /* HEADER */
    .header {
      padding: 18px 28px 14px;
      border-bottom: 2px solid var(--gray-lt);
      background: var(--white);
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-img { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; }
    .brand-name { font-size: 26px; font-weight: 800; color: var(--charcoal); letter-spacing: -0.02em; line-height: 1; }
    .brand-name span { color: var(--red); }
    .brand-sub { font-size: 11px; color: var(--gray-md); margin-top: 3px; font-weight: 400; }
    .header-right a {
      font-size: 12px; font-weight: 600; color: var(--red);
      text-decoration: none; border: 1px solid var(--red);
      padding: 6px 14px; border-radius: 1px;
      transition: background 0.15s, color 0.15s;
    }
    .header-right a:hover { background: var(--red); color: var(--white); }

    /* CONTENT */
    .content { padding: 24px 28px; display: flex; flex-direction: column; gap: 28px; }

    /* ── LATEST FEATURED ── */
    .featured-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gray-md);
      padding-bottom: 8px; border-bottom: 1px solid var(--gray-lt);
      margin-bottom: 0;
    }
    .featured-card {
      display: flex; gap: 0;
      border: 1.5px solid var(--red);
      text-decoration: none;
      position: relative; overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .featured-card:hover { box-shadow: 3px 3px 0 var(--red); }
    .featured-accent {
      width: 5px; background: var(--red); flex-shrink: 0;
    }
    .featured-body { padding: 20px 22px; flex: 1; }
    .featured-vol {
      font-size: 11px; font-weight: 700; color: var(--red);
      letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px;
    }
    .featured-title {
      font-size: 20px; font-weight: 800; color: var(--charcoal);
      line-height: 1.35; letter-spacing: -0.01em; margin-bottom: 8px;
    }
    .featured-date { font-size: 11px; color: var(--gray-md); }
    .featured-arrow {
      display: flex; align-items: center; padding: 0 24px;
      font-size: 28px; color: var(--red); font-weight: 700;
      animation: nudge 1.8s ease-in-out infinite;
    }
    @keyframes nudge { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }

    /* ── ARCHIVE GRID ── */
    .archive-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--gray-md);
      padding-bottom: 8px; border-bottom: 1px solid var(--gray-lt);
    }
    .archive-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .letter-card {
      border: 1px solid #e0e0e0;
      background: var(--white);
      text-decoration: none;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 6px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      position: relative;
    }
    .letter-card:hover {
      border-color: var(--red);
      background: rgba(221,17,21,0.02);
      transform: translateY(-2px);
    }
    .card-vol {
      font-size: 10px; font-weight: 700; color: var(--red);
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .card-title {
      font-size: 13px; font-weight: 600; color: var(--charcoal);
      line-height: 1.45;
    }
    .card-date { font-size: 10px; color: var(--gray-md); margin-top: auto; padding-top: 6px; }
    .card-arrow {
      position: absolute; bottom: 12px; right: 14px;
      font-size: 13px; color: #ddd;
      transition: color 0.15s, transform 0.15s;
    }
    .letter-card:hover .card-arrow { color: var(--red); transform: translateX(3px); }

    /* No link style */
    .letter-card.no-link { cursor: default; pointer-events: none; opacity: 0.5; }

    /* BOTTOM BAR */
    .bottombar { border-top: 2px solid #bbb; background: var(--gray-lt); flex-shrink: 0; }
    .bottom-label { padding: 3px 10px; border-bottom: 1px solid #d4d4d4; font-size: 11px; font-weight: 600; color: var(--charcoal); background: #e8e4dc; }
    .tab-row { display: flex; align-items: stretch; height: 28px; }
    .bt-tab {
      padding: 0 13px; font-size: 11px; font-weight: 500; color: #555;
      border-right: 1px solid #d0d0d0;
      display: flex; align-items: center; white-space: nowrap;
      text-decoration: none; cursor: pointer; background: var(--gray-lt);
      transition: background 0.1s, color 0.1s;
    }
    .bt-tab.on { background: var(--white); font-weight: 600; color: var(--charcoal); }
    .bt-tab:hover:not(.on) { background: #e4e0d8; color: var(--charcoal); }
    .running-badge {
      margin-left: auto; background: #2a8a34; color: var(--white);
      font-size: 11px; font-weight: 700; padding: 0 14px;
      letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px;
      border-left: 1px solid #ccc;
    }
    .run-dot { width: 6px; height: 6px; border-radius: 50%; background: #9fffaa; animation: blink 2.5s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    @media (max-width: 600px) {
      .archive-grid { grid-template-columns: repeat(2, 1fr); }
      .header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .content { padding: 16px; }
    }
    @media (max-width: 400px) {
      .archive-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
